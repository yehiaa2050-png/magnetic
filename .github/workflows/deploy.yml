name: Sync to Hugging Face Space (Docker)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # تكوين هوية Git - هذه الأوامر يجب أن تكون هنا
          git config --global user.email "eissa0070@users.noreply.github.com"
          git config --global user.name "eissa0070"
          
          git remote set-url origin https://eissa0070:$HF_TOKEN@huggingface.co/spaces/eissa0070/n8nautomtion
          git fetch origin main
          git merge origin/main --allow-unrelated-histories --no-edit
          git push origin main
